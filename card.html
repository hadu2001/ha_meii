<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day!</title>
    <link rel="stylesheet" href="./card.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
     <audio id="bg-music" preload="auto"></audio>
    <button id="music-btn" class="music-btn">
    <span class="material-symbols-outlined">music_note</span>
</button>
    <div class="main">
        <div class="card">
            <div class="message">
                <div class="back-container">
                    <a href="javascript:void(0);" id="go-back-button">
                        <div class="back">
                            <span class="material-symbols-outlined">arrow_back</span>
                            <span class="back-text">Go back</span>
                        </div>
                    </a>
                </div>
                <h3 class="sp-name">Dear, <span id="spName">Mai</span></h3>
                <p id="chosenQuote">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Sunt ratione atque nihil
                    enim? Autem expedita perferendis repellendus totam doloribus. Tenetur adipisci sed quas fugit id,
                    maiores est impedit optio et.</p>
                <h3 class="fp-name">Yours, <span id="fpName">Hà</span></h3>
                <img src="./assets/rose.png" class="rose" alt="rose">
            </div>
        </div>
        <div class="copyright-container">
            <h3 class="copyright">Created with ❤️ by <a id="instagramProfileLink" href="https://www.instagram.com/ha.cn_?igsh=MTkzM2Q4a3Y1dTdhZg==" target="_blank"><span id="instagramProfileName">Hà</span></a></h3>
        </div>
    </div>

    <script src="./card.js"></script>
    <script src="./app.js" type="module"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source');
            const cardElement = document.querySelector('.card');

            switch (source) {
                case 'propose':
                case 'chocolate':
                case 'teddy':
                case 'promise':
                case 'hug':
                case 'kiss':
                case 'valentine':
                case 'six-months':
                    cardElement.classList.add(source);
                    const savedBg = localStorage.getItem(source === 'six-months' ? "sixMonthsBg" : "valentineBg");

                    if (savedBg && (cardElement.classList.contains("valentine") || cardElement.classList.contains("six-months"))) {
                    cardElement.style.backgroundImage = `url(${savedBg})`;
                    }
                    break;
            }

            if (document.referrer.includes("propose.html")) {
                document.querySelector(".rose").classList.add("propose");
            } else if (document.referrer.includes("chocolate.html")) {
                document.querySelector(".rose").classList.add("chocolate");
            } else if (document.referrer.includes("teddy.html")) {
                document.querySelector(".rose").classList.add("teddy");
            } else if (document.referrer.includes("promise.html")) {
                document.querySelector(".rose").classList.add("promise");
            } else if (document.referrer.includes("hug.html")) {
                document.querySelector(".rose").classList.add("hug");
            } else if (document.referrer.includes("kiss.html")) {
                document.querySelector(".rose").classList.add("kiss");
            } else if (document.referrer.includes("valentine.html")) {
                document.querySelector(".rose").classList.add("valentine");
            } else if (document.referrer.includes("six-months.html")) {
                document.querySelector(".rose").classList.add("valentine");
            }
        });

        document.getElementById('go-back-button').addEventListener('click', function () {
            window.history.back();
        });
    </script>
     <script>
document.addEventListener('DOMContentLoaded', function () {

    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');

    const playlist = [
        "./assets/nhac/love-story.mp3",
        "./assets/nhac/Đức Phúc - Hơn Cả Yêu (Official Music Video).mp3"
    ];

    let currentSong = 0;
    let musicStarted = false;

    function playSong(index) {
        music.src = playlist[index];
        music.volume = 0.4;
        music.muted = false; // bỏ muted để có tiếng
        music.load();

        music.play().then(() => {
            musicStarted = true;
            musicBtn.classList.add('playing');
        }).catch(() => {
            console.log("Chờ click để phát nhạc...");
        });
    }

    // Click nút để bật/tắt nhạc
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // tránh ảnh hưởng click toàn trang

        if (!musicStarted) {
            playSong(currentSong);
        } else {
            if (music.paused) {
                music.play();
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicBtn.classList.remove('playing');
            }
        }
    });

    // Mồi click đầu tiên toàn trang (auto play)
    document.addEventListener('click', () => {
        if (!musicStarted) {
            playSong(currentSong);
        }
    }, { once: true });

    // Loop playlist
    music.addEventListener('ended', () => {
        currentSong = (currentSong + 1) % playlist.length;
        playSong(currentSong);
    });

});
</script>
</body>

</html>
