    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/gsap.min.js'></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script>
        // JavaScript to handle the tank filling animation and redirection
        document.addEventListener('DOMContentLoaded', function () {
        const tank = document.querySelector('.tank');
        const heartWrap = document.querySelector('.heart-wrap');
        const fillDuration = 50; // Duration in milliseconds for each fill
        let clickCount = 0;

        function createHeartParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.innerText = '❤️';
                p.style.position = 'absolute';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.fontSize = `${Math.random() * 15 + 10}px`;
                p.style.transform = 'translate(-50%, -50%)';
                p.style.pointerEvents = 'none';
                p.style.zIndex = '5';
                heartWrap.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;

                gsap.to(p, {
                    x: dx,
                    y: dy,
                    opacity: 0,
                    scale: 0.2,
                    rotation: Math.random() * 360,
                    duration: 1,
                    ease: "power2.out",
                    onComplete: () => p.remove()
                });
            }
        }

        heartWrap.addEventListener('click', function () {
            if (clickCount >= 3) return; // Prevent multiple triggers
            clickCount++;
            
            if (clickCount <= 3) {
                const fillHeight = (clickCount / 3) * 100;
                tank.style.transition = `height ${fillDuration}ms ease-in-out`;
                tank.style.height = `${fillHeight}%`;

                if (clickCount === 3) {
                    setTimeout(() => {
                        document.querySelector('.heart').classList.add('no-beat');
                        gsap.to('.click-hint', { opacity: 0, scale: 0.5, duration: 0.3 });

                        const arrowEl = document.querySelector('.cupid-arrow');
                        arrowEl.style.display = 'block';

                        gsap.timeline()
                            .fromTo(arrowEl, { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" })
                            // Pull back string and arrow
                            .to("#arrow", { x: -20, duration: 0.8, ease: "power1.inOut" })
                            .to("#bow-string", { attr: { d: "M 32 10 L -5 50 L 32 90" }, duration: 0.8, ease: "power1.inOut" }, "<")
                            // Shoot!
                            .to("#arrow", { x: 300, duration: 0.25, ease: "power2.in" })
                            .to("#bow-string", { attr: { d: "M 32 10 L 32 50 L 32 90" }, duration: 0.05, ease: "elastic.out(1, 0.3)" }, "<")
                            // Heart impact & particles
                            .to(".heart", { 
                                scale: 1.25, 
                                duration: 0.1, 
                                yoyo: true, 
                                repeat: 1, 
                                ease: "power1.out",
                                onStart: () => {
                                    createHeartParticles();
                                }
                            }, "-=0.05")
                            // Fade out whole container and redirect
                            .to(".heart-wrap", { opacity: 0, scale: 0.8, duration: 0.5, delay: 0.4 })
                            .call(() => {
                                // Access the parent window and stop the music directly
                                const parentWindow = window.parent;
                                if (parentWindow) {
                                    const parentAudio = parentWindow.document.querySelector('.audio');
                                    const parentMusicIcon = parentWindow.document.querySelector('.music-close');

                                    if (parentAudio && !parentAudio.paused) {
                                        parentAudio.pause();
                                        parentAudio.currentTime = 0;
                                        console.log("Music stopped directly in parent window.");
                                    }

                                    if (parentMusicIcon) {
                                        parentMusicIcon.classList.remove('rotate');
                                    }
                                }

                                // Redirect to the third index.html (6 months special)
                                window.location.href = './six-months-special/index.html';
                            });
                    }, fillDuration + 100);
                }
            }
        });
    });
    </script>
    <script>
document.addEventListener('DOMContentLoaded', function () {

    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');

    const playlist = [
        "./assets/nhac/love-story.mp3",
        "./assets/nhac/Đức Phúc - Hơn Cả Yêu (Official Music Video).mp3"
    ];

    let currentSong = 0;
    let musicStarted = false;

    function playSong(index) {
        music.src = playlist[index];
        music.volume = 0.4;
        music.muted = false; // bỏ muted để có tiếng
        music.load();

        music.play().then(() => {
            musicStarted = true;
            musicBtn.classList.add('playing');
        }).catch(() => {
            console.log("Chờ click để phát nhạc...");
        });
    }

    // Click nút để bật/tắt nhạc
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // tránh ảnh hưởng click toàn trang

        if (!musicStarted) {
            playSong(currentSong);
        } else {
            if (music.paused) {
                music.play();
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicBtn.classList.remove('playing');
            }
        }
    });

    // Mồi click đầu tiên toàn trang (auto play)
    document.addEventListener('click', () => {
        if (!musicStarted) {
            playSong(currentSong);
        }
    }, { once: true });

    // Loop playlist
    music.addEventListener('ended', () => {
        currentSong = (currentSong + 1) % playlist.length;
        playSong(currentSong);
    });

});
</script>
