<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day Mai 💗💗💗</title>
    <link rel="stylesheet" href="quotes.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
     <audio id="bg-music" preload="auto"></audio>
    <button id="music-btn" class="music-btn">
    <span class="material-symbols-outlined">music_note</span>
</button>
    <div class="main">
        <h2 class="danhtang">💝 Dành tặng em – người anh yêu  💝</h2>

        <div class="container">
            <a href="valentine.html" class="day-link" data-date="2025-02-14">
                <div class="valentine-day day">
                    <div class="icon">
                        <lord-icon src="https://cdn.lordicon.com/etgnxeer.json" trigger="hover"></lord-icon>
                    </div>
                    <div class="info">
                        <h1 class="day-name">Valentine's Day</h1>
                        <p class="date">Feb 14</p>
                        <div class="countdown" id="countdown-valentine"></div>
                    </div>
                </div>
            </a>
            <a href="six-months.html" class="day-link" data-date="2026-07-21">
                <div class="six-months-day day">
                    <div class="icon">
                        <lord-icon src="https://cdn.lordicon.com/etgnxeer.json" trigger="hover"></lord-icon>
                    </div>
                    <div class="info">
                        <h1 class="day-name">6 Months</h1>
                        <p class="date">Jul 21</p>
                        <div class="countdown" id="countdown-six-months"></div>
                    </div>
                </div>
            </a>
        </div>
        <div class="copyright-container">
            <!-- <h3 class="copyright">Created with ❤️ by <a href="https://www.instagram.com/ha.cn_?igsh=MTkzM2Q4a3Y1dTdhZg==" target="_blank" style="color: white; text-decoration: underline;">Hà</a></h3> -->
        </div>
    </div>

    <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <script>
document.addEventListener('DOMContentLoaded', function () {

    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');

    const playlist = [
        "./assets/nhac/love-story.mp3",
        "./assets/nhac/Đức Phúc - Hơn Cả Yêu (Official Music Video).mp3"
    ];

    let currentSong = 0;
    let musicStarted = false;

    function playSong(index) {
        music.src = playlist[index];
        music.volume = 0.4;
        music.muted = false; // bỏ muted để có tiếng
        music.load();

        music.play().then(() => {
            musicStarted = true;
            musicBtn.classList.add('playing');
        }).catch(() => {
            console.log("Chờ click để phát nhạc...");
        });
    }

    // Click nút để bật/tắt nhạc
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // tránh ảnh hưởng click toàn trang

        if (!musicStarted) {
            playSong(currentSong);
        } else {
            if (music.paused) {
                music.play();
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicBtn.classList.remove('playing');
            }
        }
    });

    // Mồi click đầu tiên toàn trang (auto play)
    document.addEventListener('click', () => {
        if (!musicStarted) {
            playSong(currentSong);
        }
    }, { once: true });

    // Loop playlist
    music.addEventListener('ended', () => {
        currentSong = (currentSong + 1) % playlist.length;
        playSong(currentSong);
    });

    // Countdown logic
    function updateCountdown() {
        const dayLinks = document.querySelectorAll('.day-link');
        dayLinks.forEach(link => {
            const dateStr = link.getAttribute('data-date');
            const countdownDiv = link.querySelector('.countdown');
            if (!dateStr || !countdownDiv) return;

            const targetDate = new Date(dateStr + 'T00:00:00');
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                countdownDiv.innerHTML = "Đã mở khóa! ❤️";
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                countdownDiv.innerHTML = `Còn ${days} ngày ${hours}h ${minutes}m ${seconds}s`;
            }
        });
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

});
</script>


</body>

</html>
